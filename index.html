<!DOCTYPE html>
<html>
<head>
  <base href="/avatar/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Avatar Face Masking">

  <title>Avatar Mirror</title>

  <!-- MediaPipe 라이브러리 로드 (버전 고정) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3" type="text/javascript"></script>

  <script>
    let faceLandmarker;
    let videoElement;

    // AI 초기화 함수
    async function initTracking() {
      try {
        // 라이브러리 이름이 'tasksVision'이 아닐 경우를 대비해 윈도우 객체에서 직접 확인
        const visionModule = window.tasksVision;
        if (!visionModule) {
          throw new Error("MediaPipe global 'tasksVision' is not found.");
        }

        const vision = await visionModule.FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );

        faceLandmarker = await visionModule.FaceLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
            delegate: "GPU"
          },
          outputFaceBlendshapes: true,
          runningMode: "VIDEO",
          numFaces: 1
        });
        
        console.log("MediaPipe initialized successfully");
      } catch (e) {
        console.error("JS AI Init Error:", e);
        throw e; // Dart에 에러를 던집니다.
      }
    }

    window.getFaceData = function() {
      if (!faceLandmarker) return "LOADING";
      
      if (!videoElement) {
        videoElement = document.querySelector('video');
      }

      if (!videoElement || videoElement.readyState !== 4) return "NO_VIDEO";

      try {
        const result = faceLandmarker.detectForVideo(videoElement, performance.now());
        if (result && result.faceLandmarks && result.faceLandmarks.length > 0) {
          return {
            landmarks: result.faceLandmarks[0],
            blendshapes: result.faceBlendshapes[0].categories
          };
        }
      } catch (e) {
        return "ERROR";
      }
      return "NO_FACE";
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>

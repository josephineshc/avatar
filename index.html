<!DOCTYPE html>
<html>
<head>
  <base href="/avatar/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Avatar Face Masking">
  <title>Avatar Mirror</title>

  <!-- 1. 라이브러리를 동기적으로 로드 (async 제거) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3" type="text/javascript"></script>

  <script>
    let faceLandmarker;
    let videoElement;
    let isAiReady = false;
    let aiInitError = null;

    async function initTracking() {
      if (isAiReady) return true;
      if (aiInitError) throw new Error(aiInitError);

      try {
        console.log("AI 초기화 시도 중...");
        
        // 2. 클래스 탐색 (window 바로 아래 또는 tasksVision 아래)
        const mp = window.tasksVision || window;
        const FL = mp.FaceLandmarker;
        const FR = mp.FilesetResolver;

        if (!FL || !FR) {
          // 클래스가 아직 없으면 1초만 더 기다려봅니다.
          console.log("클래스 대기 중... 1초 후 재시도");
          await new Promise(r => setTimeout(r, 1000));
          return initTracking(); 
        }

        const vision = await FR.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );
        
        faceLandmarker = await FL.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
            delegate: "GPU"
          },
          outputFaceBlendshapes: true,
          runningMode: "VIDEO",
          numFaces: 1
        });
        
        isAiReady = true;
        console.log("AI 엔진 준비 완료!");
        return true;
      } catch (e) {
        aiInitError = e.message;
        console.error("AI 초기화 상세 오류:", e);
        throw e;
      }
    }

    window.getFaceData = function() {
      if (!isAiReady || !faceLandmarker) return "LOADING";
      if (!videoElement) videoElement = document.querySelector('video');
      if (!videoElement || videoElement.readyState !== 4) return "NO_VIDEO";

      try {
        const result = faceLandmarker.detectForVideo(videoElement, performance.now());
        if (result && result.faceLandmarks && result.faceLandmarks.length > 0) {
          return {
            landmarks: result.faceLandmarks[0],
            blendshapes: result.faceBlendshapes[0].categories
          };
        }
      } catch (e) { return "ERROR"; }
      return "NO_FACE";
    };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
